services:
  mysql-db:
    image: mysql:8.0.40
    container_name: enterprise-mysql
    restart: always
    environment:
      MYSQL_DATABASE: enterprise
      MYSQL_USER: adminDir
      MYSQL_PASSWORD: secret1234
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    networks:
      - enterprise-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: enterprise-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=adminDir
      - DB_PASSWORD=secret1234
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - enterprise-net

networks:
  enterprise-net:
    driver: bridge